<section class="hero">
  <!-- Neural Network Animation -->
  <div class="neural-network">
    <!-- Connection lines -->
    <svg class="connections" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid slice">
      <defs>
        <linearGradient id="connectionGradient" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3" />
          <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:0.6" />
          <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0.3" />
        </linearGradient>
      </defs>
      <!-- Dynamic connection lines will be added by CSS -->
    </svg>

    <!-- Neural nodes -->
    <div class="node node-1"></div>
    <div class="node node-2"></div>
    <div class="node node-3"></div>
    <div class="node node-4"></div>
    <div class="node node-5"></div>
    <div class="node node-6"></div>
    <div class="node node-7"></div>
    <div class="node node-8"></div>
    <div class="node node-9"></div>
    <div class="node node-10"></div>

    <!-- Floating tech symbols -->
    <div class="symbol symbol-1">⟨⟩</div>
    <div class="symbol symbol-2">∑</div>
    <div class="symbol symbol-3">∫</div>
    <div class="symbol symbol-4">∆</div>
    <div class="symbol symbol-5">∞</div>
    <div class="symbol symbol-6">∇</div>
    <div class="symbol symbol-7">∏</div>
    <div class="symbol symbol-8">∂</div>
  </div>

  <div class="hero-text">
    <h1>Helping Children Learn How to Think, Create & Solve Problems</h1>
    <p>
      KidoForge transforms technology education into an interactive journey
      where children explore AI, robotics, communication, and digital skills
      through hands-on challenges, creativity, and real-world problem solving.
    </p>

    <div class="buttons">
      <button class="primary">Start Learning</button>
      <button class="secondary">Explore Courses</button>
    </div>
  </div>
</section>
