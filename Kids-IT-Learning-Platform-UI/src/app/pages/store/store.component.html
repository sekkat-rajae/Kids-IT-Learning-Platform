<app-navbar></app-navbar>

<section class="store-page">
  <div class="store-controls">
    <div class="filter-section">
      <div class="filter-dropdown">
        <select>
          <option>All Categories</option>
          <option>E-books</option>
          <option>Creative Kits</option>
          <option>Educational Toys</option>
          <option>Digital Resources</option>
          <option>Parent Guides</option>
        </select>
      </div>

      <div class="filter-dropdown">
        <select>
          <option>Sort by: Featured</option>
          <option>Price: Low to High</option>
          <option>Price: High to Low</option>
          <option>Newest</option>
          <option>Best Selling</option>
        </select>
      </div>
    </div>

    <div class="search-section">
      <div class="search-box">
        <input type="text" placeholder="Search for educational products...">
        <button class="search-btn">🔍</button>
      </div>
    </div>

    <div class="action-buttons">
      <button class="action-btn favorites-btn" title="Favorites">
        <span class="btn-icon">❤️</span>
      </button>
      <button class="action-btn cart-btn" title="Shopping Cart">
        <span class="btn-icon">🛒</span>
        <span class="cart-count">0</span>
      </button>
    </div>
  </div>

  <div class="products-section">
    <div *ngIf="isLoading" class="loading">Loading products...</div>
    <div *ngIf="!isLoading && products.length === 0" class="empty">No products available.</div>

    <div class="products-grid">
      <div class="product-card" *ngFor="let product of products">
        <div class="product-image">
          <div class="placeholder-image" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
            <div class="image-icon">📦</div>
          </div>
          <div class="favorite-btn">♡</div>
          <div class="product-badge" *ngIf="product.badge">{{ product.badge }}</div>
        </div>

        <div class="product-content">
          <div class="seller-info">
            <div class="seller-avatar">KF</div>
            <span class="seller-name">{{ product.sellerName }}</span>
          </div>

          <h3 class="product-title">{{ product.title }}</h3>
          <p class="product-description">{{ product.description }}</p>

          <div class="product-meta">
            <div class="rating">
              <span class="stars">{{ '★'.repeat(product.rating ? product.rating : 0) }}</span>
              <span class="reviews">({{ product.reviewCount || 0 }} reviews)</span>
            </div>
          </div>

          <div class="product-footer">
            <div class="price-section">
              <span class="current-price">${{ product.price }}</span>
              <span class="original-price" *ngIf="product.originalPrice">${{ product.originalPrice }}</span>
            </div>
            <button class="add-to-cart-btn">Add to Cart</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
